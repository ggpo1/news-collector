# Без GPU / Ollama (UI, дизайн, фронт):
#   docker compose up -d postgres api frontend
#   docker compose up -d postgres api frontend worker   # + сбор RSS
#
# Полный стек с Ollama и AI-воркерами:
#   docker compose --profile ollama up -d
#
# Или через .env: COMPOSE_PROFILES=ollama

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-news_collector}
      POSTGRES_USER: ${POSTGRES_USER:-news}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-news}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-news} -d ${POSTGRES_DB:-news_collector}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Сборка образа воркера Telegram (не запускается как сервис — только image для orchestrator).
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram-bot
    image: news-collector-telegram-bot:latest
    entrypoint: ["/bin/true"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5182}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      telegram-bot:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # root (0:0) — доступ к docker.sock (владелец root на хосте). Альтернатива: appuser + group_add с верным DOCKER_GID.
    user: "${API_CONTAINER_USER:-0:0}"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-true}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://ollama:11434}
      Ollama__Model: ${OLLAMA_MODEL:-qwen3.5:9b}
      Ollama__TimeoutSeconds: ${OLLAMA_TIMEOUT_SECONDS:-1800}
      Ollama__NumCtx: ${OLLAMA_NUM_CTX:-8192}
      Ollama__KeepAlive: ${OLLAMA_KEEP_ALIVE:-5m}
      Auth__JwtSecret: ${AUTH_JWT_SECRET:-change-this-secret-in-production-min-32-characters-long}
      Auth__JwtExpirationMinutes: ${AUTH_JWT_EXPIRATION_MINUTES:-480}
      Auth__SeedChiefEditorLogin: ${AUTH_SEED_CHIEF_LOGIN:-chief}
      Auth__SeedChiefEditorPassword: ${AUTH_SEED_CHIEF_PASSWORD:-changeme}
      Auth__SeedChiefEditorDisplayName: ${AUTH_SEED_CHIEF_DISPLAY_NAME:-Главный редактор}
      TelegramBotOrchestrator__Enabled: ${TELEGRAM_ORCHESTRATOR_ENABLED:-true}
      TelegramBotOrchestrator__DockerImage: ${TELEGRAM_BOT_IMAGE:-news-collector-telegram-bot:latest}
      TelegramBotOrchestrator__DockerNetwork: ${DOCKER_NETWORK:-news-collector_default}
      TelegramBotOrchestrator__WorkerConnectionString: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      TelegramBotOrchestrator__WorkerHttpProxy: ${TELEGRAM_PROXY:-${TELEGRAM_WORKER_HTTP_PROXY:-}}
      TelegramBotOrchestrator__WorkerHttpsProxy: ${TELEGRAM_PROXY:-${TELEGRAM_WORKER_HTTPS_PROXY:-}}
      Telegram__HttpProxy: ${TELEGRAM_PROXY:-${OUTBOUND_PROXY:-}}
      Telegram__HttpsProxy: ${TELEGRAM_PROXY:-${OUTBOUND_PROXY:-}}
      Telegram__NoProxy: postgres,localhost,127.0.0.1,::1,ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5190}:80"
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-false}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Collector__RssFetchTimeoutSeconds: ${RSS_FETCH_TIMEOUT_SECONDS:-120}
      OutboundProxy__HttpProxy: ${OUTBOUND_PROXY:-${TELEGRAM_PROXY:-}}
      OutboundProxy__HttpsProxy: ${OUTBOUND_PROXY:-${TELEGRAM_PROXY:-}}
      OutboundProxy__NoProxy: postgres,localhost,127.0.0.1,::1,ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  news-search-indexer:
    build:
      context: .
      dockerfile: Dockerfile.news-search-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-false}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      NewsSearchIndexer__PollingIntervalSeconds: ${NEWS_SEARCH_INDEXER_INTERVAL_SECONDS:-30}
      NewsSearchIndexer__BatchSize: ${NEWS_SEARCH_INDEXER_BATCH_SIZE:-25}
      NewsSearchIndexer__DelayBetweenItemsMs: ${NEWS_SEARCH_INDEXER_DELAY_MS:-0}
      NewsSearchIndexer__MaxBodyCharacters: ${NEWS_SEARCH_INDEXER_MAX_BODY_CHARS:-8000}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  topic-linker:
    profiles: [ollama]
    build:
      context: .
      dockerfile: Dockerfile.topic-linker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      ollama-embed-pull:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://ollama:11434}
      TopicLinker__PollingIntervalSeconds: ${TOPIC_LINKER_INTERVAL_SECONDS:-60}
      TopicLinker__EmbeddingModel: ${TOPIC_LINKER_EMBED_MODEL:-nomic-embed-text}
      TopicLinker__UseEmbeddings: ${TOPIC_LINKER_USE_EMBEDDINGS:-true}
      TopicLinker__UseEntityOverlap: ${TOPIC_LINKER_USE_ENTITIES:-true}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  news-categorizer:
    profiles: [ollama]
    build:
      context: .
      dockerfile: Dockerfile.news-categorizer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama-categorizer:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-false}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_CATEGORIZER_BASE_URL:-http://ollama-categorizer:11434}
      Ollama__Model: ${OLLAMA_CATEGORIZER_MODEL:-llama3.2:3b}
      Ollama__TimeoutSeconds: ${OLLAMA_CATEGORIZER_TIMEOUT_SECONDS:-600}
      NewsCategorizer__PollingIntervalSeconds: ${NEWS_CATEGORIZER_INTERVAL_SECONDS:-60}
      NewsCategorizer__BatchSize: ${NEWS_CATEGORIZER_BATCH_SIZE:-10}
      NewsCategorizer__DelayBetweenItemsMs: ${NEWS_CATEGORIZER_DELAY_MS:-200}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  editorial-brief:
    profiles: [ollama]
    build:
      context: .
      dockerfile: Dockerfile.editorial-brief
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      ollama-chat-pull:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-false}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://ollama:11434}
      Ollama__Model: ${OLLAMA_MODEL:-qwen3.5:9b}
      Ollama__TimeoutSeconds: ${OLLAMA_TIMEOUT_SECONDS:-1800}
      Ollama__NumCtx: ${OLLAMA_NUM_CTX:-8192}
      Ollama__KeepAlive: ${OLLAMA_KEEP_ALIVE:-5m}
      EditorialBrief__PollingIntervalSeconds: ${EDITORIAL_BRIEF_INTERVAL_SECONDS:-3600}
      EditorialBrief__ScheduleHoursUtc__0: ${EDITORIAL_BRIEF_MORNING_UTC:-6}
      EditorialBrief__ScheduleHoursUtc__1: ${EDITORIAL_BRIEF_EVENING_UTC:-18}
      EditorialBrief__WindowHours: ${EDITORIAL_BRIEF_WINDOW_HOURS:-12}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  news-tone-analyzer:
    profiles: [ollama]
    build:
      context: .
      dockerfile: Dockerfile.news-tone-analyzer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama-tone:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-false}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_TONE_BASE_URL:-http://ollama-tone:11434}
      Ollama__Model: ${OLLAMA_TONE_MODEL:-llama3.2:3b}
      Ollama__TimeoutSeconds: ${OLLAMA_TONE_TIMEOUT_SECONDS:-600}
      NewsToneAnalyzer__PollingIntervalSeconds: ${NEWS_TONE_ANALYZER_INTERVAL_SECONDS:-60}
      NewsToneAnalyzer__BatchSize: ${NEWS_TONE_ANALYZER_BATCH_SIZE:-10}
      NewsToneAnalyzer__DelayBetweenItemsMs: ${NEWS_TONE_ANALYZER_DELAY_MS:-200}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  news-entity-extractor:
    profiles: [ollama]
    build:
      context: .
      dockerfile: Dockerfile.news-entity-extractor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama-ner:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-false}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_NER_BASE_URL:-http://ollama-ner:11434}
      Ollama__Model: ${OLLAMA_NER_MODEL:-llama3.2:3b}
      Ollama__TimeoutSeconds: ${OLLAMA_NER_TIMEOUT_SECONDS:-600}
      NewsEntityExtractor__PollingIntervalSeconds: ${NEWS_ENTITY_EXTRACTOR_INTERVAL_SECONDS:-60}
      NewsEntityExtractor__BatchSize: ${NEWS_ENTITY_EXTRACTOR_BATCH_SIZE:-5}
      NewsEntityExtractor__DelayBetweenItemsMs: ${NEWS_ENTITY_EXTRACTOR_DELAY_MS:-500}
      NewsEntityExtractor__MaxEntitiesPerNews: ${NEWS_ENTITY_EXTRACTOR_MAX_ENTITIES:-20}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama-chat-pull:
    profiles: [ollama]
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until ollama pull "$${OLLAMA_CHAT_MODEL:-qwen3.5:9b}"; do
          echo "Waiting for ollama, pulling $${OLLAMA_CHAT_MODEL:-qwen3.5:9b}..."
          sleep 5
        done
    restart: "no"

  ollama-embed-pull:
    profiles: [ollama]
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${TOPIC_LINKER_EMBED_MODEL:-nomic-embed-text}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until ollama pull "$${OLLAMA_EMBED_MODEL:-nomic-embed-text}"; do
          echo "Waiting for ollama, pulling $${OLLAMA_EMBED_MODEL:-nomic-embed-text}..."
          sleep 5
        done
    restart: "no"

  ollama-ner:
    profiles: [ollama]
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "${OLLAMA_NER_PORT:-11436}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 30m
    volumes:
      - ollama_ner_data:/root/.ollama
    gpus: all
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama-ner-pull:
    profiles: [ollama]
    image: ollama/ollama:latest
    depends_on:
      ollama-ner:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama-ner:11434
      OLLAMA_NER_MODEL: ${OLLAMA_NER_MODEL}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until ollama pull "$${OLLAMA_NER_MODEL:-llama3.2:3b}"; do
          echo "Waiting for ollama-ner, pulling $${OLLAMA_NER_MODEL:-llama3.2:3b}..."
          sleep 5
        done
    restart: "no"

  ollama-categorizer:
    profiles: [ollama]
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "${OLLAMA_CATEGORIZER_PORT:-11437}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 30m
    volumes:
      - ollama_categorizer_data:/root/.ollama
    gpus: all
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama-categorizer-pull:
    profiles: [ollama]
    image: ollama/ollama:latest
    depends_on:
      ollama-categorizer:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama-categorizer:11434
      OLLAMA_CATEGORIZER_MODEL: ${OLLAMA_CATEGORIZER_MODEL}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until ollama pull "$${OLLAMA_CATEGORIZER_MODEL:-llama3.2:3b}"; do
          echo "Waiting for ollama-categorizer, pulling $${OLLAMA_CATEGORIZER_MODEL:-llama3.2:3b}..."
          sleep 5
        done
    restart: "no"

  ollama-tone:
    profiles: [ollama]
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "${OLLAMA_TONE_PORT:-11438}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 30m
    volumes:
      - ollama_tone_data:/root/.ollama
    gpus: all
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama-tone-pull:
    profiles: [ollama]
    image: ollama/ollama:latest
    depends_on:
      ollama-tone:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama-tone:11434
      OLLAMA_TONE_MODEL: ${OLLAMA_TONE_MODEL}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until ollama pull "$${OLLAMA_TONE_MODEL:-llama3.2:3b}"; do
          echo "Waiting for ollama-tone, pulling $${OLLAMA_TONE_MODEL:-llama3.2:3b}..."
          sleep 5
        done
    restart: "no"

volumes:
  postgres_data:
  ollama_data:
  ollama_ner_data:
  ollama_categorizer_data:
  ollama_tone_data:
