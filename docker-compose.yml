services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-news_collector}
      POSTGRES_USER: ${POSTGRES_USER:-news}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-news}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-news} -d ${POSTGRES_DB:-news_collector}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5182}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-true}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://ollama:11434}
      Ollama__Model: ${OLLAMA_MODEL:-llama3.2}
      Ollama__TimeoutSeconds: ${OLLAMA_TIMEOUT_SECONDS:-1800}
      Auth__JwtSecret: ${AUTH_JWT_SECRET:-change-this-secret-in-production-min-32-characters-long}
      Auth__JwtExpirationMinutes: ${AUTH_JWT_EXPIRATION_MINUTES:-480}
      Auth__SeedChiefEditorLogin: ${AUTH_SEED_CHIEF_LOGIN:-chief}
      Auth__SeedChiefEditorPassword: ${AUTH_SEED_CHIEF_PASSWORD:-changeme}
      Auth__SeedChiefEditorDisplayName: ${AUTH_SEED_CHIEF_DISPLAY_NAME:-Главный редактор}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5190}:80"
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-true}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Collector__RssFetchTimeoutSeconds: ${RSS_FETCH_TIMEOUT_SECONDS:-120}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  topic-linker:
    build:
      context: .
      dockerfile: Dockerfile.topic-linker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      TopicLinker__PollingIntervalSeconds: ${TOPIC_LINKER_INTERVAL_SECONDS:-60}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  news-categorizer:
    build:
      context: .
      dockerfile: Dockerfile.news-categorizer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-true}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://ollama:11434}
      Ollama__Model: ${OLLAMA_MODEL:-llama3.2}
      Ollama__TimeoutSeconds: ${OLLAMA_TIMEOUT_SECONDS:-1800}
      NewsCategorizer__PollingIntervalSeconds: ${NEWS_CATEGORIZER_INTERVAL_SECONDS:-60}
      NewsCategorizer__BatchSize: ${NEWS_CATEGORIZER_BATCH_SIZE:-10}
      NewsCategorizer__DelayBetweenItemsMs: ${NEWS_CATEGORIZER_DELAY_MS:-200}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  news-tone-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.news-tone-analyzer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      RunMigrations: ${RUN_MIGRATIONS:-true}
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-news_collector};
        Username=${POSTGRES_USER:-news};
        Password=${POSTGRES_PASSWORD:-news}
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://ollama:11434}
      Ollama__Model: ${OLLAMA_MODEL:-llama3.2}
      Ollama__TimeoutSeconds: ${OLLAMA_TIMEOUT_SECONDS:-1800}
      NewsToneAnalyzer__PollingIntervalSeconds: ${NEWS_TONE_ANALYZER_INTERVAL_SECONDS:-60}
      NewsToneAnalyzer__BatchSize: ${NEWS_TONE_ANALYZER_BATCH_SIZE:-10}
      NewsToneAnalyzer__DelayBetweenItemsMs: ${NEWS_TONE_ANALYZER_DELAY_MS:-200}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 30m
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  ollama_data:
